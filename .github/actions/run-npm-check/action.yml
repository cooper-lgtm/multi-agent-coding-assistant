name: Run NPM Check
description: Set up Node, install dependencies, and run a repository check.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "20"
  command:
    description: Shell command block to execute after npm install.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Run check
      shell: bash
      run: ${{ inputs.command }}
