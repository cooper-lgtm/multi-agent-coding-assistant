name: Codex PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  request-review:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      CODEX_REVIEW_TOKEN: ${{ secrets.CODEX_REVIEW_TOKEN }}
    steps:
      - name: Local dry run (act)
        if: ${{ env.ACT == 'true' }}
        run: |
          echo "ACT local run: skip posting review request comment."
          echo "@codex review"
          echo
          echo "commit: ${{ github.event.pull_request.head.sha }}"

      - name: Skip when CODEX_REVIEW_TOKEN is not configured
        if: ${{ env.ACT != 'true' && env.CODEX_REVIEW_TOKEN == '' }}
        run: echo "CODEX_REVIEW_TOKEN is not configured; skipping Codex review request."

      - name: Request Codex review
        if: ${{ env.ACT != 'true' && env.CODEX_REVIEW_TOKEN != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.CODEX_REVIEW_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const sha = pr.head.sha;
            const marker = `commit: ${sha}`;
            const body = `@codex review\n\n${marker}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const alreadyRequested = comments.some((comment) => {
              return comment.body && comment.body.includes(marker);
            });

            if (alreadyRequested) {
              core.info(`Codex review already requested for ${sha}`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
